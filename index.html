<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alex Hosein — Quant Developer · AI Systems Builder · Founder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:           #07090E;
      --bg-2:         #0B0F17;
      --surface:      #0F141E;
      --surface-2:    #141A26;
      --line:         rgba(255,255,255,0.07);
      --line-strong:  rgba(255,255,255,0.13);
      --text:         #E8EAF0;
      --text-2:       #9098AD;
      --text-3:       #5E667C;
      --accent:       #6DD9FF; /* default cyan-blue */
      --accent-soft:  rgba(109, 217, 255, 0.14);
      --accent-glow:  rgba(109, 217, 255, 0.35);
      --max:          1240px;
      --pad-x:        clamp(20px, 4vw, 56px);
      --radius-lg:    18px;
      --radius-md:    12px;
      --radius-sm:    8px;
      --mono:         "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans:         "Inter", system-ui, -apple-system, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:var(--sans);
      font-feature-settings:"ss01","cv11";
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
      line-height:1.55;
    }

    /* Ambient gradient backdrop — fixed, very subtle */
    body::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none; z-index:0;
      background:
        radial-gradient(900px 600px at 12% -10%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 60%),
        radial-gradient(700px 500px at 100% 8%, rgba(120,140,255,0.08), transparent 60%),
        radial-gradient(800px 600px at 50% 110%, rgba(80,100,200,0.07), transparent 60%);
    }
    body::after{
      content:"";
      position:fixed; inset:0;
      pointer-events:none; z-index:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    }

    /* Selection */
    ::selection{ background: var(--accent-soft); color: var(--text); }

    /* Buttons */
    .btn{
      display:inline-flex; align-items:center; gap:8px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: -0.005em;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      cursor: pointer; text-decoration:none;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
      white-space: nowrap;
    }
    .btn:hover{ background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.22); transform: translateY(-1px); }
    .btn .ic{ width:14px; height:14px; }
    .btn-primary{
      background: var(--accent);
      color: #06121A;
      border-color: transparent;
      box-shadow: 0 0 0 1px var(--accent-glow), 0 10px 30px -10px var(--accent-glow);
      font-weight: 600;
    }
    .btn-primary:hover{ background: color-mix(in oklab, var(--accent) 92%, white); color:#04101A; }
    .btn-ghost{ border-color: var(--line); background: transparent; color: var(--text-2); }
    .btn-ghost:hover{ color: var(--text); }

    /* Mono eyebrow */
    .eyebrow{
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      display:inline-flex; align-items:center; gap:10px;
    }
    .eyebrow::before{
      content:""; width:14px; height:1px; background: var(--text-3);
    }

    /* Headlines */
    h1,h2,h3,h4{ margin:0; font-weight: 600; letter-spacing: -0.02em; }
    h1{ font-size: clamp(44px, 7vw, 92px); line-height: 0.98; font-weight: 600; letter-spacing: -0.035em;}
    h2{ font-size: clamp(28px, 3.8vw, 44px); line-height: 1.05; letter-spacing: -0.025em;}
    h3{ font-size: 19px; line-height: 1.3; }
    p{ margin: 0; color: var(--text-2); }
    .lede{ font-size: clamp(15px, 1.4vw, 17px); color: var(--text-2); max-width: 60ch; }

    a{ color: var(--text); }

    /* Container & sections */
    .container{ max-width: var(--max); margin: 0 auto; padding: 0 var(--pad-x); position:relative; z-index:1; }
    section{ position: relative; padding: clamp(80px, 11vw, 140px) 0; }
    section + section{ border-top: 1px solid var(--line); }

    .section-header{
      display:flex; align-items:baseline; justify-content:space-between;
      gap: 24px; margin-bottom: 56px; flex-wrap: wrap;
    }
    .section-title-block{ max-width: 640px; }
    .section-title-block h2{ margin-top: 14px; }
    .section-title-block p{ margin-top: 18px; }
    .section-num{
      font-family: var(--mono); font-size: 11px; color: var(--text-3);
      letter-spacing: 0.16em; text-transform: uppercase;
    }

    /* Card primitive */
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
    }
    .card::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), transparent 30%);
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      padding: 1px;
      opacity: .6;
    }

    /* Reveal animation */
    .reveal{ opacity: 0; transform: translateY(14px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
    .reveal.in{ opacity: 1; transform: none; }

    /* Utility */
    .row{ display:flex; gap:12px; flex-wrap:wrap; }
    .stack-sm{ display:flex; flex-direction:column; gap:8px; }

    @media (max-width: 720px){
      section{ padding: 72px 0; }
      .section-header{ margin-bottom: 36px; }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
